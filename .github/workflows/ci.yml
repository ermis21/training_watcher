name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (test extra; stdlib-only core, no torch/GPU on CI)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run unit tests (GPU/torch tests skip automatically)
        run: pytest -q
